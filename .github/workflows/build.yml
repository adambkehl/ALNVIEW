name: Build ALNview

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-linux:
    name: Linux (static binary)
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build static binary in Docker
        uses: docker/build-push-action@v6
        with:
          context: .
          target: output
          push: false
          outputs: type=local,dest=dist
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test
        run: |
          echo "=== Binary format ==="
          file dist/ALNview
          file dist/ALNview | grep -q "statically linked" || { echo "FAIL: not statically linked"; exit 1; }
          ls -lh dist/ALNview

          echo "=== Dynamic deps (should be none) ==="
          ldd dist/ALNview 2>&1 && { echo "FAIL: has dynamic dependencies"; exit 1; } || echo "OK: no dynamic dependencies"

          echo "=== Launch test ==="
          # The app needs an X display so it will fail, but it should at least
          # load and complain about the display, not about missing libraries
          chmod +x dist/ALNview
          output=$(dist/ALNview 2>&1 || true)
          echo "$output"
          # If it fails due to missing libs, that's a real error
          if echo "$output" | grep -qi "error while loading shared libraries"; then
            echo "FAIL: missing shared libraries"
            exit 1
          fi
          echo "Smoke test passed"

      - name: Upload Linux binary
        uses: actions/upload-artifact@v4
        with:
          name: ALNview-linux-x86_64
          path: dist/ALNview

  build-macos:
    name: macOS (Universal DMG)
    runs-on: macos-14
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install Qt 6
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.9.0'

      - name: Build ALNview (universal binary)
        run: |
          mkdir build && cd build
          qmake ../viewer.pro \
            "QMAKE_APPLE_DEVICE_ARCHS=x86_64 arm64" \
            "QMAKE_MACOSX_DEPLOYMENT_TARGET=13.0"
          make -j$(sysctl -n hw.ncpu)

      - name: Create app bundle with macdeployqt
        run: |
          cd build
          macdeployqt ALNview.app -verbose=2

      - name: Ad-hoc code sign (inside-out)
        run: |
          APP="build/ALNview.app"

          # Sign all frameworks from the inside out
          find "$APP/Contents/Frameworks" -name "*.framework" -type d | while read fw; do
            binary=$(find "$fw/Versions" -type f -perm +111 ! -name "*.plist" 2>/dev/null | head -1)
            if [ -n "$binary" ]; then
              codesign --force --sign - --timestamp=none "$binary"
            fi
            codesign --force --sign - --timestamp=none "$fw"
          done

          # Sign any dylibs
          find "$APP/Contents/Frameworks" -name "*.dylib" -type f | while read lib; do
            codesign --force --sign - --timestamp=none "$lib"
          done

          # Sign all plugins
          find "$APP/Contents/PlugIns" -name "*.dylib" -type f 2>/dev/null | while read plugin; do
            codesign --force --sign - --timestamp=none "$plugin"
          done

          # Sign the main executable
          codesign --force --sign - --timestamp=none "$APP/Contents/MacOS/ALNview"

          # Sign the entire app bundle
          codesign --force --sign - --timestamp=none "$APP"

          # Verify
          codesign --verify --deep --strict "$APP"
          echo "Code signing verified successfully"

      - name: Smoke test
        run: |
          APP="build/ALNview.app"
          BINARY="$APP/Contents/MacOS/ALNview"

          # Verify it's a universal Mach-O binary with both slices
          echo "=== Binary format ==="
          file "$BINARY"
          file "$BINARY" | grep -q "Mach-O" || { echo "FAIL: not a Mach-O binary"; exit 1; }

          echo "=== Architecture slices ==="
          lipo -info "$BINARY"
          lipo -info "$BINARY" | grep -q "x86_64" || { echo "FAIL: missing x86_64 slice"; exit 1; }
          lipo -info "$BINARY" | grep -q "arm64" || { echo "FAIL: missing arm64 slice"; exit 1; }
          echo "Universal binary OK (x86_64 + arm64)"

          # Verify code signature
          echo "=== Code signature ==="
          codesign -dvvv "$APP" 2>&1
          codesign --verify --deep --strict "$APP" 2>&1
          echo "Signature OK"

          # Verify Gatekeeper assessment (ad-hoc will be rejected, but we log it)
          echo "=== Gatekeeper assessment ==="
          spctl --assess --verbose "$APP" 2>&1 || echo "(Expected: ad-hoc signed apps are rejected by Gatekeeper without notarization)"

          # Try to launch briefly — the app needs a display, so it will fail,
          # but we can at least verify it loads (exits non-zero is OK)
          echo "=== Launch test ==="
          timeout 5 "$BINARY" --help 2>&1 || true
          echo "Smoke test passed"

      - name: Create DMG
        run: |
          mkdir -p dmg-staging
          cp -R build/ALNview.app dmg-staging/
          ln -s /Applications dmg-staging/Applications

          hdiutil create -volname "ALNview" \
            -srcfolder dmg-staging \
            -ov -format UDZO \
            ALNview.dmg

          ls -lh ALNview.dmg

      - name: Upload macOS DMG
        uses: actions/upload-artifact@v4
        with:
          name: ALNview-macOS
          path: ALNview.dmg

  # Create a release when a tag is pushed
  release:
    name: Create Release
    needs: [build-linux, build-macos]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: ALNview-linux-x86_64
          path: linux

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: ALNview-macOS
          path: macos

      - name: Prepare release assets
        run: |
          chmod +x linux/ALNview
          tar czf ALNview-linux-x86_64.tar.gz -C linux ALNview

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ALNview-linux-x86_64.tar.gz
            macos/ALNview.dmg
          generate_release_notes: true
